<!DOCTYPE html>
<html>
<head>

        p { color: #5f6368; line-height: 1.6; }

</head>
<body>

        <div>
            <span class="tag">Web Design</span>
            <span class="tag">Coding</span>
            <span class="tag">Education</span>
        </div>
    </div>
</body>
</html>
