<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arriv4Lz | Responsive Sidebar</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --sidebar-width: 260px;
            --sidebar-closed-width: 0px; /* ถ้าจะให้หายไปเลยใช้ 0px หรือจะเหลือแค่ไอคอนก็ได้ */
        }

        body {
            font-family: 'Kanit', sans-serif;
            margin: 0;
            display: flex;
            background-color: #f0f2f5;
            transition: 0.3s;
        }

        /* --- Sidebar Style --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--dark);
            color: white;
            position: fixed;
            left: 0;
            transition: 0.3s; /* ทำให้ตอนหุบดูนุ่มนวล */
            overflow: hidden;
            z-index: 1000;
        }

        /* คลาสที่จะถูกเติมด้วย JavaScript เพื่อสั่งหุบเมนู */
        .sidebar.closed {
            left: calc(var(--sidebar-width) * -1);
        }

        .sidebar-content {
            padding: 20px;
            width: var(--sidebar-width);
        }

        /* --- Main Content Style --- */
        .main-content {
            margin-left: var(--sidebar-width);
            width: 100%;
            padding: 40px;
            transition: 0.3s;
        }

        /* เมื่อ Sidebar ปิด ให้ขยายพื้นที่เนื้อหาให้เต็มจอ */
        .main-content.expand {
            margin-left: 0;
        }

        /* --- ปุ่มเปิด/ปิด --- */
        .toggle-btn {
            position: fixed;
            left: 20px;
            top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1100;
            font-family: 'Kanit';
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .menu-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: #334155;
            color: white;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-top: 60px; /* หลบปุ่ม Toggle */
        }
    </style>
</head>
<body>

    <!-- ปุ่มกดสำหรับสลับ เปิด/ปิด -->
    <button class="toggle-btn" onclick="toggleSidebar()">☰ เมนู</button>

    <!-- Sidebar -->
    <div class="sidebar" id="mySidebar">
        <div class="sidebar-content">
            <h2 style="color: #38bdf8;">Arriv4Lz OS</h2>
            <hr style="border: 0.5px solid #334155;">
            <a href="#" class="menu-item">🏠 หน้าแรก</a>
            <a href="#" class="menu-item">📁 ผลงานของฉัน</a>
            <a href="#" class="menu-item">🎮 Roblox Project</a>
            <a href="#" class="menu-item">⚙️ ตั้งค่า</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="card">
            <h1>ระบบ Sidebar แบบพับเก็บได้!</h1>
            <p>ลองกดปุ่ม <b>"☰ เมนู"</b> ที่มุมซ้ายบนดูครับโบ ตัวเมนูจะหุบหายไป และเนื้อหาฝั่งขวาจะขยายเต็มจอโดยอัตโนมัติ</p>
            <p>ฟีเจอร์นี้ช่วยให้ผู้ใช้งานมีสมาธิกับเนื้อหามากขึ้น (Focus Mode) และดูเป็นมืออาชีพสุดๆ</p>
        </div>
    </div>

    <!-- ส่วนของ JavaScript (สมองของปุ่ม) -->
    <script>
        function toggleSidebar() {
            // สั่งให้หา Sidebar และ Main Content
            const sidebar = document.getElementById("mySidebar");
            const main = document.getElementById("mainContent");

            // สั่งให้ "เพิ่ม" หรือ "เอาออก" คลาส closed และ expand
            sidebar.classList.toggle("closed");
            main.classList.toggle("expand");
        }
    </script>

</body>
</html>
